name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  # Dummy values so build-time module evaluation (env var presence checks,
  # Prisma client construction) doesn't fail — no real secrets, no live DB
  # connection is made during typecheck/lint/build.
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
  JWT_SECRET: "ci-only-secret-not-used-in-production-aaaaaaaa"
  JWT_REFRESH_SECRET: "ci-only-secret-not-used-in-production-bbbbbbbb"
  CRON_SECRET: "ci-only-secret"
  NEXTAUTH_URL: "http://localhost:81"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck all scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck scripts/*.sh

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Install nginx (for the config-generator integration test)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nginx

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm run prisma:generate

      - name: Prisma schema validate
        run: pnpm exec prisma validate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Unit + config-generator integration tests
        run: pnpm run test

      - name: Build
        run: pnpm run build
